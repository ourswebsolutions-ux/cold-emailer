name: 🚀 Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -e

            cd ~/htdocs/axorawebsolutions.com/outreach

            git fetch origin
            git reset --hard origin/main

            npm install
            npx prisma generate
            npx prisma migrate deploy || true
            npm run build

            pm2 restart cold-emailer || pm2 start npm --name cold-emailer -- start

            pm2 save

